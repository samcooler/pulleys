; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = traveler, station, station_wroom, arbiter

; ── Shared defaults (applied to all envs) ─────────────────────────────────────
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = time

; ── Traveler: ESP32-S3 (custom 4MB/2MB board), BLE advertiser + LED matrix ────
[env:traveler]
board = esp32s3_4mb_2mbpsram
board_dir = boards
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D BOARD_HAS_PSRAM
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_TRAVELER
	-D LED_PIN=14
	-D LED_COUNT=64
lib_deps =
	fastled/FastLED
	h2zero/NimBLE-Arduino
build_src_filter = +<traveler/>

; ── Station: Seeed XIAO ESP32-C3, BLE scanner + 8x32 LED matrix ───────────────
[env:station]
board = seeed_xiao_esp32c3
build_flags =
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_STATION
	-D LED_PIN=10
	-D LED_COUNT=256
	-D PULLEYS_SSAA=1
lib_deps =
	fastled/FastLED
	h2zero/NimBLE-Arduino
build_src_filter = +<station/>

; ── Station WROOM: D1 Mini ESP32-WROOM-32, full SSAA (hardware FPU) ───────────
[env:station_wroom]
board = wemos_d1_mini32
build_flags =
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_STATION
	-D LED_PIN=16
	-D LED_COUNT=256
	-D PULLEYS_SSAA=3
lib_deps =
	fastled/FastLED
	h2zero/NimBLE-Arduino
build_src_filter = +<station/>
upload_port  = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

; ── Arbiter: ESP32-S3 (16MB/8MB PSRAM), 4.3" 800×480 RGB LCD, LVGL display ──
[env:arbiter]
board = esp32s3_16mb_8mbpsram
board_dir = boards
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D BOARD_HAS_PSRAM
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_ARBITER
	-D LV_CONF_INCLUDE_SIMPLE
	-I include
lib_deps =
	lovyan03/LovyanGFX @ ^1.1.9
	lvgl/lvgl @ ^8.4.0
build_src_filter = +<arbiter/>
