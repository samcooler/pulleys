; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = traveler, station_s3

; ── Shared defaults (applied to all envs) ─────────────────────────────────────
[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = time

; ── Traveler: ESP32-S3 (custom 4MB/2MB board), BLE advertiser + LED matrix ────
[env:traveler]
board = esp32s3_4mb_2mbpsram
board_dir = boards
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D BOARD_HAS_PSRAM
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_TRAVELER
	-D LED_PIN=14
	-D LED_COUNT=64
lib_deps =
	fastled/FastLED
	h2zero/NimBLE-Arduino
build_src_filter = +<traveler/>

; OTA upload (uncomment and set board number to flash over WiFi):
; upload_protocol = espota
; upload_port = pulleys-01.local

; ── Station (dev): ESP32-S3 DevKitC-1, BLE scanner + LED strip ────────────────
[env:station_s3]
board = esp32-s3-devkitc-1
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_STATION
	-D LED_PIN=48
	-D LED_COUNT=10
lib_deps =
	fastled/FastLED
	h2zero/NimBLE-Arduino
build_src_filter = +<station/>

; ── Station (production): Seeed XIAO ESP32-C3 ─────────────────────────────────
[env:station_c3]
board = seeed_xiao_esp32c3
build_flags =
	-D PULLEYS_DEVICE_TYPE=PULLEYS_TYPE_STATION
	-D LED_PIN=10
	-D LED_COUNT=256
lib_deps =
	fastled/FastLED
	h2zero/NimBLE-Arduino
build_src_filter = +<station/>
